<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesquisa Municipal — Jundiaí SP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--azul:#0D3B6E;--azul-med:#1B5FA8;--azul-light:#E6F1FB;--verde:#0E7C4A;--verde-l:#D4F0E3;--laranja:#E06320;--laranja-l:#FFF0E6;--vermelho:#C0392B;--vermelho-l:#FDECEA;--cinza-f:#F4F6FA;--cinza-b:#E2E8F0;--cinza-t:#64748B;--texto:#1A2332;--branco:#FFFFFF;--sombra:0 4px 24px rgba(13,59,110,0.10);--raio:16px;--raio-sm:10px;--fonte-h:'Sora',sans-serif;--fonte-b:'DM Sans',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fonte-b);background:#F4F7FC;color:var(--texto);min-height:100vh;}
body::before{content:'';position:fixed;top:-120px;right:-120px;width:480px;height:480px;background:radial-gradient(circle,rgba(27,95,168,0.12) 0%,transparent 70%);pointer-events:none;z-index:0;}
.header{position:fixed;top:0;left:0;right:0;background:var(--azul);z-index:100;padding:0 24px;}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;}
.header-title{font-family:var(--fonte-h);font-size:13px;font-weight:600;color:rgba(255,255,255,0.9);letter-spacing:0.5px;}
.header-prog{font-family:var(--fonte-h);font-size:12px;color:rgba(255,255,255,0.65);}
.barra-wrap{position:fixed;top:56px;left:0;right:0;height:4px;background:rgba(255,255,255,0.15);z-index:100;}
.barra-fill{height:100%;background:linear-gradient(90deg,#5BB8FF,#38E8B5);transition:width 0.5s cubic-bezier(.4,0,.2,1);width:0%;}
.container{max-width:720px;margin:0 auto;padding:80px 20px 100px;position:relative;z-index:1;}
.capa{text-align:center;padding:40px 0 20px;}
.capa-badge{display:inline-block;background:var(--azul-light);color:var(--azul-med);font-family:var(--fonte-h);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:6px 16px;border-radius:100px;margin-bottom:24px;}
.capa h1{font-family:var(--fonte-h);font-size:32px;font-weight:700;color:var(--azul);line-height:1.2;margin-bottom:12px;}
.capa p{font-size:16px;color:var(--cinza-t);line-height:1.7;max-width:500px;margin:0 auto 32px;}
.chips{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:32px;}
.chip{display:flex;align-items:center;gap:6px;background:var(--branco);border:1px solid var(--cinza-b);border-radius:100px;padding:6px 14px;font-size:13px;color:var(--cinza-t);}
.info-box{background:var(--azul-light);border-radius:var(--raio);padding:20px 24px;text-align:left;border-left:4px solid var(--azul-med);}
.info-box p{font-size:13px;color:var(--azul);line-height:1.7;margin:0;}
.bloco-card{background:var(--branco);border-radius:var(--raio);box-shadow:var(--sombra);overflow:hidden;margin-bottom:16px;animation:slideUp 0.4s ease both;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.bloco-header{background:var(--azul);padding:16px 24px;display:flex;align-items:center;gap:12px;}
.bloco-letra{width:32px;height:32px;background:rgba(255,255,255,0.18);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--fonte-h);font-size:14px;font-weight:700;color:white;flex-shrink:0;}
.bloco-titulo{font-family:var(--fonte-h);font-size:14px;font-weight:600;color:rgba(255,255,255,0.95);}
.bloco-body{padding:24px;}
.pq-wrap{margin-bottom:28px;}
.pq-wrap:last-child{margin-bottom:0;}
.pq-num{font-family:var(--fonte-h);font-size:10px;font-weight:700;color:var(--azul-med);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.pq-txt{font-family:var(--fonte-h);font-size:16px;font-weight:600;color:var(--texto);line-height:1.45;margin-bottom:4px;}
.pq-dica{font-size:13px;color:var(--cinza-t);margin-bottom:14px;line-height:1.5;}
.opcoes{display:flex;flex-direction:column;gap:8px;}
.opcao{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid var(--cinza-b);border-radius:var(--raio-sm);cursor:pointer;transition:all 0.18s;background:var(--cinza-f);user-select:none;}
.opcao:hover{border-color:var(--azul-med);background:var(--azul-light);}
.opcao.sel{border-color:var(--azul-med);background:var(--azul-light);box-shadow:0 0 0 3px rgba(27,95,168,0.12);}
.radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--cinza-b);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.18s;}
.opcao.sel .radio{border-color:var(--azul-med);background:var(--azul-med);}
.opcao.sel .radio::after{content:'';width:8px;height:8px;border-radius:50%;background:white;}
.opcao-txt{font-size:14px;color:var(--texto);line-height:1.4;}
.opcao.sel .opcao-txt{color:var(--azul);font-weight:500;}

/* AUTOCOMPLETE */
.ac-wrap{position:relative;}
.campo{width:100%;padding:14px 16px;border:1.5px solid var(--cinza-b);border-radius:var(--raio-sm);font-family:var(--fonte-b);font-size:14px;color:var(--texto);background:var(--cinza-f);transition:border-color 0.18s;outline:none;}
.campo:focus{border-color:var(--azul-med);background:var(--branco);}
.campo::placeholder{color:#b0bec5;}
.campo.ok{border-color:var(--verde);background:var(--verde-l);}
.campo.err{border-color:var(--vermelho);background:var(--vermelho-l);}
.ac-lista{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--branco);border:1.5px solid var(--azul-med);border-radius:var(--raio-sm);box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:200;max-height:220px;overflow-y:auto;display:none;}
.ac-lista.open{display:block;animation:slideUp 0.15s ease;}
.ac-item{padding:12px 16px;cursor:pointer;font-size:14px;color:var(--texto);border-bottom:1px solid var(--cinza-f);transition:background 0.12s;display:flex;align-items:center;gap:8px;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.ativo{background:var(--azul-light);color:var(--azul);}
.ac-item em{font-style:normal;font-weight:700;color:var(--azul-med);}
.bairro-badge{display:inline-flex;align-items:center;gap:6px;background:var(--verde-l);border:1px solid var(--verde);color:var(--verde);border-radius:100px;padding:5px 12px;font-size:13px;font-weight:500;margin-top:8px;}
.bairro-badge button{background:none;border:none;cursor:pointer;color:var(--verde);font-size:18px;line-height:1;padding:0 0 0 4px;}
.ac-hint{font-size:12px;color:var(--cinza-t);margin-top:6px;}
/* GEOCODING ADDRESS */
.geo-status { font-size:12px; margin-top:6px; display:flex; align-items:center; gap:6px; }
.geo-spin { width:12px; height:12px; border:2px solid var(--cinza-b); border-top-color:var(--azul-med); border-radius:50%; animation:spin360 0.7s linear infinite; }
@keyframes spin360 { to { transform:rotate(360deg); } }
.geo-ok  { color:var(--verde); font-weight:500; }
.geo-err { color:var(--vermelho); }


/* ESCALA */
.escala{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.en{flex:1;min-width:36px;height:48px;border:1.5px solid var(--cinza-b);border-radius:8px;background:var(--cinza-f);display:flex;align-items:center;justify-content:center;font-family:var(--fonte-h);font-size:15px;font-weight:600;cursor:pointer;transition:all 0.15s;color:var(--cinza-t);}
.en:hover{border-color:var(--azul-med);background:var(--azul-light);color:var(--azul);}
.en.sel{background:var(--azul-med);border-color:var(--azul-med);color:white;transform:scale(1.06);}
.en[data-v="0"]{color:var(--vermelho);}
.en[data-v="10"]{color:var(--verde);}
.en[data-v="0"].sel,.en[data-v="10"].sel{color:white;}
.escala-labs{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--cinza-t);}

/* LIKERT */
.lk-wrap{overflow-x:auto;margin-top:8px;}
.lk-table{width:100%;border-collapse:collapse;min-width:480px;}
.lk-table th{font-family:var(--fonte-h);font-size:11px;font-weight:600;color:var(--azul);text-align:center;padding:8px 4px;border-bottom:2px solid var(--cinza-b);}
.lk-table th:first-child{text-align:left;padding-left:8px;}
.lk-table td{padding:10px 4px;text-align:center;border-bottom:1px solid var(--cinza-b);font-size:13px;transition:background 0.15s;}
.lk-table td:first-child{text-align:left;padding-left:8px;font-size:13px;font-weight:500;}
.lk-table tr:last-child td{border-bottom:none;}
.lk-table tr:nth-child(even) td{background:var(--cinza-f);}
.lk-table tr:hover td{background:var(--azul-light);}
.lk-r{width:22px;height:22px;border-radius:50%;border:2px solid var(--cinza-b);margin:0 auto;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.lk-r:hover{border-color:var(--azul-med);}
.lk-r.on{border-color:var(--azul-med);background:var(--azul-med);}
.lk-r.on::after{content:'';width:9px;height:9px;border-radius:50%;background:white;}

/* PRIORIDADES */
.prio-lista{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.prio-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--cinza-b);border-radius:var(--raio-sm);background:var(--cinza-f);cursor:grab;transition:all 0.18s;user-select:none;}
.prio-item:hover{border-color:var(--azul-med);background:var(--azul-light);}
.prio-item.dragging{opacity:0.5;cursor:grabbing;}
.prio-item.drag-over{border-color:var(--azul-med);background:var(--azul-light);transform:scale(1.01);}
.prio-rank{width:26px;height:26px;border-radius:6px;background:var(--azul-med);color:white;font-family:var(--fonte-h);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.prio-nome{font-size:14px;font-weight:500;flex:1;}
.prio-drag{color:var(--cinza-b);font-size:16px;}

/* TEXTAREA */
.campo-area{width:100%;padding:14px 16px;border:1.5px solid var(--cinza-b);border-radius:var(--raio-sm);font-family:var(--fonte-b);font-size:14px;color:var(--texto);background:var(--cinza-f);resize:vertical;min-height:100px;outline:none;transition:border-color 0.18s;}
.campo-area:focus{border-color:var(--azul-med);background:var(--branco);}
.cnt{font-size:11px;color:var(--cinza-b);text-align:right;margin-top:4px;}

.nota-rot{background:var(--laranja-l);border-left:3px solid var(--laranja);border-radius:0 8px 8px 0;padding:10px 14px;margin-top:10px;font-size:12px;color:var(--laranja);font-weight:500;}
.divider{height:1px;background:var(--cinza-b);margin:24px 0;}
.af-badge{background:var(--cinza-f);border:1px solid var(--cinza-b);border-radius:var(--raio-sm);padding:10px 14px;margin-top:16px;font-size:12px;color:var(--cinza-t);display:flex;align-items:center;gap:8px;}

/* BOTÕES */
.btn-wrap{position:fixed;bottom:0;left:0;right:0;background:rgba(240,244,251,0.95);backdrop-filter:blur(12px);padding:16px 20px;z-index:100;border-top:1px solid var(--cinza-b);}
.btn-wrap-inner{max-width:720px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px;}
.btn{font-family:var(--fonte-h);font-size:14px;font-weight:600;padding:13px 28px;border-radius:100px;border:none;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:6px;}
.btn-v{background:var(--branco);color:var(--cinza-t);border:1.5px solid var(--cinza-b);}
.btn-v:hover{background:var(--cinza-f);}
.btn-a{background:var(--azul-med);color:white;box-shadow:0 4px 14px rgba(27,95,168,0.3);}
.btn-a:hover{background:var(--azul);transform:translateY(-1px);}
.btn-a:disabled{background:var(--cinza-b);color:var(--cinza-t);box-shadow:none;transform:none;cursor:not-allowed;}
.btn-e{background:var(--verde);color:white;box-shadow:0 4px 14px rgba(14,124,74,0.3);}
.btn-e:hover{background:#0a6040;transform:translateY(-1px);}

/* TELAS ESPECIAIS */
.tela-final,.tela-bloq{text-align:center;padding:60px 20px;}
.tf-ico,.tb-ico{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 24px;}
.tf-ico{background:var(--verde-l);animation:popIn 0.5s cubic-bezier(.4,0,.2,1);}
.tb-ico{background:var(--laranja-l);}
@keyframes popIn{from{opacity:0;transform:scale(0.5);}to{opacity:1;transform:scale(1);}}
.tela-final h2{font-family:var(--fonte-h);font-size:28px;font-weight:700;color:var(--verde);margin-bottom:12px;}
.tela-bloq h2{font-family:var(--fonte-h);font-size:24px;font-weight:700;color:var(--laranja);margin-bottom:12px;}
.tela-final p,.tela-bloq p{font-size:15px;color:var(--cinza-t);line-height:1.7;max-width:440px;margin:0 auto 16px;}
.dias-box{display:inline-block;background:var(--laranja-l);border:1.5px solid var(--laranja);color:var(--laranja);font-family:var(--fonte-h);font-size:20px;font-weight:700;padding:10px 24px;border-radius:100px;margin:12px 0;}
.btn-exp{display:inline-flex;align-items:center;gap:8px;background:var(--azul-med);color:white;font-family:var(--fonte-h);font-size:14px;font-weight:600;padding:13px 24px;border-radius:100px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(27,95,168,0.3);transition:all 0.18s;}
.btn-exp:hover{background:var(--azul);transform:translateY(-1px);}

.hidden{display:none!important;}
.tela{animation:fadeSlide 0.35s ease both;}
@keyframes fadeSlide{from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:translateX(0);}}
@media(max-width:520px){.capa h1{font-size:26px;}.en{min-width:28px;height:40px;font-size:13px;}.bloco-body{padding:16px;}.btn{padding:12px 20px;font-size:13px;}}

/* MODAL CONFIRMAÇÃO DE BAIRRO */
.modal-overlay{
  position:fixed;inset:0;background:rgba(4,44,83,0.7);z-index:999;
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn 0.2s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-box{
  background:#fff;border-radius:20px;padding:28px 24px;
  max-width:420px;width:100%;box-shadow:0 20px 60px rgba(4,44,83,0.25);
  animation:slideUp 0.25s ease;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-icon{
  width:56px;height:56px;background:#E6F1FB;border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
}
.modal-titulo{font-size:18px;font-weight:700;color:#042C53;text-align:center;margin-bottom:6px;}
.modal-sub{font-size:13px;color:#64748B;text-align:center;margin-bottom:20px;line-height:1.5;}
.modal-bairro-destaque{
  background:#E6F1FB;border:2px solid #185FA5;border-radius:12px;
  padding:14px 18px;text-align:center;margin-bottom:20px;
}
.modal-bairro-nome{font-size:22px;font-weight:700;color:#042C53;margin-bottom:2px;}
.modal-bairro-cidade{font-size:12px;color:#378ADD;letter-spacing:0.5px;}
.modal-btns{display:flex;flex-direction:column;gap:10px;}
.btn-confirmar{
  background:#185FA5;color:#fff;border:none;border-radius:10px;
  padding:14px;font-size:15px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:background 0.2s;
}
.btn-confirmar:hover{background:#0C447C;}
.btn-corrigir{
  background:#F4F7FC;color:#185FA5;border:1.5px solid #B5D4F4;border-radius:10px;
  padding:12px;font-size:14px;font-weight:500;cursor:pointer;
  font-family:inherit;transition:all 0.2s;
}
.btn-corrigir:hover{background:#E6F1FB;}
.modal-lista-wrap{margin-top:14px;display:none;}
.modal-lista-titulo{font-size:12px;color:#64748B;margin-bottom:8px;}
.modal-busca{
  width:100%;border:1.5px solid #B5D4F4;border-radius:8px;
  padding:8px 12px;font-size:14px;font-family:inherit;outline:none;
  margin-bottom:8px;
}
.modal-busca:focus{border-color:#185FA5;}
.modal-lista-bairros{
  max-height:180px;overflow-y:auto;border:1px solid #E2E8F0;border-radius:8px;
}
.modal-bairro-item{
  padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #F4F7FC;
  transition:background 0.15s;color:#042C53;
}
.modal-bairro-item:last-child{border-bottom:none;}
.modal-bairro-item:hover{background:#E6F1FB;}

</style>
</head>

<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:10px;">
        <svg width="24" height="24" viewBox="0 0 44 44" fill="none">
          <rect width="44" height="44" rx="8" fill="#378ADD"/>
          <rect x="7" y="22" width="7" height="15" rx="2" fill="#fff"/>
          <rect x="18" y="16" width="7" height="21" rx="2" fill="rgba(255,255,255,0.7)"/>
          <rect x="29" y="9" width="7" height="28" rx="2" fill="rgba(255,255,255,0.4)"/>
          <circle cx="10.5" cy="18" r="2" fill="#fff"/>
          <circle cx="21.5" cy="12" r="2" fill="rgba(255,255,255,0.7)"/>
          <line x1="10.5" y1="18" x2="21.5" y2="12" stroke="#fff" stroke-width="1.2" stroke-dasharray="2.5 2"/>
        </svg>
        <div>
          <div class="header-title">Civiq</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:1.5px;line-height:1;">JUNDIAÍ SP</div>
        </div>
      </div>
    <div class="header-prog" id="prog-txt"></div>
  </div>
</div>
<div class="barra-wrap"><div class="barra-fill" id="barra"></div></div>
<div class="container"><div id="app"></div></div>
<div class="btn-wrap" id="btn-area">
  <div class="btn-wrap-inner">
    <button class="btn btn-v" id="btn-v" onclick="voltar()">← Voltar</button>
    <button class="btn btn-a" id="btn-a" onclick="avancar()" disabled>Continuar →</button>
  </div>
</div>

<script>
// ════════════════════════════════════════
// ANTIFRAUDE — dupla camada sem login
// ════════════════════════════════════════
const DIAS = 45;
const VER  = 'pqj_v1';

function fingerprint() {
  const n = navigator, s = screen;
  const raw = [n.language,n.platform,n.hardwareConcurrency,n.maxTouchPoints,
    s.colorDepth,s.width+'x'+s.height,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    new Date().getTimezoneOffset(),
    n.userAgent.slice(0,80)].join('|');
  let h = 5381;
  for (let i=0;i<raw.length;i++){h=((h<<5)+h)+raw.charCodeAt(i);h=h&h;}
  return 'fp'+Math.abs(h).toString(36);
}

function idbOp(mode, key, val) {
  return new Promise(res => {
    try {
      const r = indexedDB.open('pqj_af',1);
      r.onupgradeneeded = e => e.target.result.createObjectStore('d');
      r.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction('d', mode);
        const st = tx.objectStore('d');
        const req = mode==='readwrite' ? st.put(val,key) : st.get(key);
        req.onsuccess = () => res(req.result||null);
        req.onerror = () => res(null);
      };
      r.onerror = () => res(null);
    } catch { res(null); }
  });
}

async function checkBloqueio() {
  const fp = fingerprint();
  const kls = VER+'_'+fp, kidb = VER+'_idb_'+fp;
  let rls=null, ridb=null;
  try { rls = JSON.parse(localStorage.getItem(kls)); } catch {}
  ridb = await idbOp('readonly', kidb);
  const lista = [rls,ridb].filter(Boolean);
  if (!lista.length) return {bloqueado:false, fp, kls, kidb};
  const rec = lista.reduce((a,b)=>a.ts>b.ts?a:b);
  const dias = (Date.now()-rec.ts)/(86400000);
  if (dias < DIAS) return {bloqueado:true, diasR: Math.ceil(DIAS-dias)};
  return {bloqueado:false, fp, kls, kidb};
}

async function registrar(fp, kls, kidb) {
  const d = {ts:Date.now(), fp, ver:'1.0'};
  try { localStorage.setItem(kls, JSON.stringify(d)); } catch {}
  await idbOp('readwrite', kidb, d);
}

// ════════════════════════════════════════

function norm(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();}
function filtrar(q){
  if(!q||q.length<2)return[];
  const n=norm(q);
  return BAIRROS.filter(b=>norm(b).includes(n)).slice(0,8);
}
function hl(txt,q){
  const n=norm(q),t=norm(txt),i=t.indexOf(n);
  if(i===-1)return txt;
  return txt.slice(0,i)+'<em>'+txt.slice(i,i+q.length)+'</em>'+txt.slice(i+q.length);
}

function onInput(v){
  bairroOk=false; R.bairro='';
  const lista=document.getElementById('acl'), badge=document.getElementById('bbd'), campo=document.getElementById('bci');
  badge.innerHTML=''; campo.classList.remove('ok','err');
  const res=filtrar(v); acIdx=-1;
  if(!res.length){
    lista.classList.remove('open'); lista.innerHTML='';
    if(v.length>=3) campo.classList.add('err');
  } else {
    lista.innerHTML=res.map((b,i)=>
      `<div class="ac-item" data-b="${b}" data-i="${i}"
        onmousedown="selBairro('${b.replace(/'/g,"\\'")}')"
        onmouseenter="setIdx(${i})">📍 <span>${hl(b,v)}</span></div>`
    ).join('');
    lista.classList.add('open');
  }
  chk();
}

function setIdx(i){
  acIdx=i;
  document.querySelectorAll('.ac-item').forEach((el,j)=>el.classList.toggle('ativo',j===i));
}

function onKey(e){
  const lista=document.getElementById('acl');
  const items=lista.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('ativo',i===acIdx));}
  else if(e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,0);items.forEach((el,i)=>el.classList.toggle('ativo',i===acIdx));}
  else if(e.key==='Enter'&&acIdx>=0){e.preventDefault();const a=items[acIdx];if(a)selBairro(a.dataset.b);}
  else if(e.key==='Escape') lista.classList.remove('open');
}

function selBairro(b){
  bairroOk=true; R.bairro=b;
  const campo=document.getElementById('bci'), lista=document.getElementById('acl'), badge=document.getElementById('bbd');
  campo.value=b; campo.classList.add('ok'); campo.classList.remove('err');
  lista.classList.remove('open');
  badge.innerHTML=`<div class="bairro-badge">✓ ${b}<button onclick="limBairro()">×</button></div>`;
  chk();
}

function limBairro(){
  bairroOk=false; R.bairro='';
  const campo=document.getElementById('bci'), badge=document.getElementById('bbd');
  campo.value=''; campo.classList.remove('ok','err'); badge.innerHTML=''; campo.focus(); chk();
}

let dSrc=null;
function dStart(e){dSrc=e.currentTarget;e.currentTarget.classList.add('dragging');}
function dOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dLeave(e){e.currentTarget.classList.remove('drag-over');}
function dDrop(e){
  e.preventDefault(); const t=e.currentTarget; t.classList.remove('drag-over');
  if(dSrc&&dSrc!==t){
    const l=document.getElementById('plio'), its=[...l.children];
    const si=its.indexOf(dSrc), ti=its.indexOf(t);

}

function valida(){
  const id=TELAS[tela].id;
  if(id==='capa') return true;
  if(id==='a') return !!(bairroOk&&R.bairro&&R.tempo&&R.idade&&R.genero&&R.renda);
  if(id==='b') return !!(R.qv&&R.nota!=null&&R.prob);
  if(id==='d') return !!(R.rec&&R.canal);
  if(id==='e') return !!(R.persp&&R.rec2);
  if(id.startsWith('c_')){
    const mapa={saude:'saude',edu:'educacao',seg:'seguranca',mob:'mobilidade',limp:'limpeza',infra:'infraestrutura'};
    const t2=mapa[id.replace('c_','')] || id.replace('c_','');
    const r=R['lk_'+t2]||{};
    return !!(LK[t2]&&LK[t2].i.every(it=>r[it]));
  }
  return true;
}

function chk(){const b=document.getElementById('btn-a');if(b)b.disabled=!valida();}

function prog(){
  const tot=TELAS.length-1, pct=Math.round((Math.min(tela,tot)/tot)*100);
  document.getElementById('barra').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=tela===0?'':pct+'% concluído';
  const bv=document.getElementById('btn-v'); if(bv)bv.style.visibility=tela===0?'hidden':'visible';
  const ba=document.getElementById('btn-a');
  if(ba){
    if(TELAS[tela].id==='e'){ba.textContent='Enviar pesquisa ✓';ba.className='btn btn-e';}
    else{ba.innerHTML='Continuar →';ba.className='btn btn-a';}
  }
  const ba2=document.getElementById('btn-area');
  if(ba2) ba2.classList.toggle('hidden',TELAS[tela].id==='final');
}

function renderT(){
  if(af&&af.bloqueado&&tela===0){document.getElementById('app').innerHTML=rBloqueio(af.diasR);return;}
  document.getElementById('app').innerHTML=TELAS[tela].fn();
  prog(); chk();
  window.scrollTo({top:0,behavior:'smooth'});
  if(TELAS[tela].id==='a'&&R.bairro) bairroOk=true;
}

function avancar(){if(!valida())return;if(tela<TELAS.length-1){tela++;renderT();}}
function voltar(){if(tela>0){tela--;renderT();}}

function exportar(){
  const d={meta:{versao:'1.0',municipio:'Jundiaí SP',base:'Censo IBGE 2022',ts:new Date().toISOString()},respostas:{...R}};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});

  a.download='pesquisa_jundiai_'+Date.now()+'.json'; a.click(); URL.revokeObjectURL(a.href);
}

function cepNumero(cep) {
  return parseInt(cep.replace(/\D/g,''));
}

function cepValido(cep) {
  const n = cepNumero(cep);
  return CEP_JUNDIAI_RANGES.some(([min,max]) => n >= min && n <= max);
}

function formatarCep(v) {
  const d = v.replace(/\D/g,'').slice(0,8);
  return d.length > 5 ? d.slice(0,5)+'-'+d.slice(5) : d;
}

let cepTimer = null;

function onCepInput(valor) {
  bairroOk = false;
  R.bairro = '';
  R.cep = valor;
  R.lat = null;
  R.lng = null;

  const formatado = formatarCep(valor);
  const campo = document.getElementById('bci');
  const status = document.getElementById('geo-status');
  const bbd = document.getElementById('bbd');

  if (!campo) { chk(); return; }

  if (campo.value !== formatado) {
    campo.value = formatado;
    R.cep = formatado;
  }

  campo.classList.remove('ok','err');
  if (bbd) bbd.innerHTML = '';
  if (status) status.innerHTML = '';

  const digits = formatado.replace(/\D/g,'');

  if (digits.length < 8) { chk(); return; }

  if (!cepValido(digits)) {
    if (status) status.innerHTML = '<span style="color:#E24B4A;font-size:12px;">CEP não corresponde a Jundiaí SP. Verifique e tente novamente.</span>';
    campo.classList.add('err');
    chk();
    return;
  }

  clearTimeout(cepTimer);
  if (status) status.innerHTML = '<div style="display:flex;align-items:center;gap:6px;"><div style="width:12px;height:12px;border:2px solid #185FA5;border-top-color:transparent;border-radius:50%;animation:spin360 0.7s linear infinite;"></div><span style="font-size:12px;color:#7B95B8;">Buscando bairro...</span></div>';

  cepTimer = setTimeout(() => buscarCep(digits), 400);
  chk();
}

async function buscarCep(digits) {
  const prefixo = digits.slice(0,5);
  const opcoesBairro = CEP_BAIRRO[prefixo] || [];

  function aplicarBairro(bairroNome, logradouro) {
    const norm = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
    const bNorm = norm(bairroNome || '');
    const match = BAIRROS.find(b => norm(b) === bNorm || norm(b).includes(bNorm) || bNorm.includes(norm(b)));
    const bairro = match || (opcoesBairro.length > 0 ? opcoesBairro[0] : 'Centro');
    R._bairroTemp = bairro;
    R._logradouroTemp = logradouro || '';
    const st = document.getElementById('geo-status');
    if (st) st.innerHTML = '';
    abrirModalBairro(bairro);
  }

  // Tentar ViaCEP
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000);
    const resp = await fetch('https://viacep.com.br/ws/' + digits + '/json/', { signal: ctrl.signal });
    clearTimeout(timer);
    const data = await resp.json();

    if (!data.erro) {
      // ViaCEP retornou dados válidos
      const bairroViaCep = data.bairro && data.bairro.length > 0 ? data.bairro : (opcoesBairro[0]||'Centro');
      aplicarBairro(bairroViaCep, data.logradouro || '');
      return;
    }
    // CEP retornou {erro:true} — usar fallback interno imediatamente
    aplicarBairro(opcoesBairro.length > 0 ? opcoesBairro[0] : 'Centro', '');
  } catch(err) {
    // Timeout ou erro de rede — sempre usar mapeamento interno
    aplicarBairro(opcoesBairro.length > 0 ? opcoesBairro[0] : 'Centro', '');
  }
}

function limBairro() {
  bairroOk = false;
  R.bairro = '';
  R.cep = '';
  R.lat = null;
  R.lng = null;
  const campo = document.getElementById('bci');
  campo.value = '';
  campo.classList.remove('ok','err');
  document.getElementById('bbd').innerHTML = '';
  document.getElementById('geo-status').innerHTML = '';
  campo.focus();
  chk();
}


// ════════════════════════════════════════
// MODAL DE CONFIRMAÇÃO DE BAIRRO — funções no escopo correto
// ════════════════════════════════════════

function abrirModalBairro(bairro) {
  document.getElementById('modal-nome-bairro').textContent = bairro;
  const wrap = document.getElementById('modal-lista-wrap');
  wrap.style.display = 'none';
  const busca = document.getElementById('modal-busca');
  if (busca) busca.value = '';
  document.getElementById('modal-bairro-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function fecharModalBairro() {
  document.getElementById('modal-bairro-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

function _confirmarBairro() {
  const bairro = R._bairroTemp || 'Centro';
  const coords = BAIRROS_COORDS[bairro];
  if (coords) {
    R.lat = coords[0] + (Math.random()-0.5)*0.003;
    R.lng = coords[1] + (Math.random()-0.5)*0.003;
  }
  R.bairro = bairro;
  R.endereco = R._logradouroTemp ? R._logradouroTemp + ' — Jundiaí SP' : 'Jundiaí SP';
  bairroOk = true;
  const campo = document.getElementById('bci');
  if (campo) { campo.classList.add('ok'); campo.classList.remove('err'); }
  const bbd = document.getElementById('bbd');
  if (bbd) bbd.innerHTML = '<div class="bairro-badge">✓ ' + bairro + '<button onclick="limBairro()">×</button></div>';
  fecharModalBairro();
  chk();
}

function _abrirListaBairros() {
  const wrap = document.getElementById('modal-lista-wrap');
  wrap.style.display = 'block';
  _renderListaModal(BAIRROS);
  document.getElementById('modal-busca').focus();
}

function _renderListaModal(lista) {
  const container = document.getElementById('modal-lista-bairros');
  container.innerHTML = lista.map(b =>
    '<div class="modal-bairro-item" data-bairro="' + b + '">' + b + '</div>'
  ).join('');
  // Adicionar listeners nos itens
  container.querySelectorAll('.modal-bairro-item').forEach(el => {
    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      R._bairroTemp = this.getAttribute('data-bairro');
      document.getElementById('modal-nome-bairro').textContent = R._bairroTemp;
      document.getElementById('modal-lista-wrap').style.display = 'none';
      _confirmarBairro();
    });
  });
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
(async()=>{
  af = await checkBloqueio();
  renderT();

  // Listeners do modal de bairro — dentro do escopo que tem acesso a BAIRROS e BAIRROS_COORDS
  document.getElementById('btn-modal-confirmar').addEventListener('click', function() {
    _confirmarBairro();
  });
  document.getElementById('btn-modal-corrigir').addEventListener('click', function() {
    _abrirListaBairros();
  });
  document.getElementById('modal-bairro-overlay').addEventListener('click', function(e) {
    if (e.target === this) fecharModalBairro();
  });
  document.getElementById('modal-busca').addEventListener('input', function() {
    const norm = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
    const q = norm(this.value);
    if (!q) { _renderListaModal(BAIRROS); return; }
    const palavras = q.split(/\s+/).filter(Boolean);
    const filtrados = BAIRROS.filter(b => {
      const bn = norm(b);
      return palavras.every(p => bn.includes(p));
    });
    filtrados.sort((a, b) => {
      const an = norm(a), bn2 = norm(b);
      const aP = an.split(' ').some(w => w.startsWith(q)) ? 0 : 1;
      const bP = bn2.split(' ').some(w => w.startsWith(q)) ? 0 : 1;
      return aP - bP || a.localeCompare(b, 'pt-BR');
    });
    _renderListaModal(filtrados);
  });
})();
</script>
