<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>

* { margin: 0px; padding: 0px; box-sizing: border-box; }
body { font-family: var(--fonte-b); background: rgb(244, 247, 252); color: var(--texto); min-height: 100vh; }
body::before { content: ""; position: fixed; top: -120px; right: -120px; width: 480px; height: 480px; background: radial-gradient(circle, rgba(27, 95, 168, 0.12) 0%, transparent 70%); pointer-events: none; z-index: 0; }
.header { position: fixed; top: 0px; left: 0px; right: 0px; background: var(--azul); z-index: 100; padding: 0px 24px; }
.header-inner { max-width: 720px; margin: 0px auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
.header-title { font-family: var(--fonte-h); font-size: 13px; font-weight: 600; color: rgba(255, 255, 255, 0.9); letter-spacing: 0.5px; }
.header-prog { font-family: var(--fonte-h); font-size: 12px; color: rgba(255, 255, 255, 0.65); }
.barra-wrap { position: fixed; top: 56px; left: 0px; right: 0px; height: 4px; background: rgba(255, 255, 255, 0.15); z-index: 100; }
.barra-fill { height: 100%; background: linear-gradient(90deg, rgb(91, 184, 255), rgb(56, 232, 181)); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
.container { max-width: 720px; margin: 0px auto; padding: 80px 20px 100px; position: relative; z-index: 1; }
.capa { text-align: center; padding: 40px 0px 20px; }
.capa-badge { display: inline-block; background: var(--azul-light); color: var(--azul-med); font-family: var(--fonte-h); font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 16px; border-radius: 100px; margin-bottom: 24px; }
.capa h1 { font-family: var(--fonte-h); font-size: 32px; font-weight: 700; color: var(--azul); line-height: 1.2; margin-bottom: 12px; }
.capa p { font-size: 16px; color: var(--cinza-t); line-height: 1.7; max-width: 500px; margin: 0px auto 32px; }
.chips { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 32px; }
.chip { display: flex; align-items: center; gap: 6px; background: var(--branco); border: 1px solid var(--cinza-b); border-radius: 100px; padding: 6px 14px; font-size: 13px; color: var(--cinza-t); }
.info-box { background: var(--azul-light); border-radius: var(--raio); padding: 20px 24px; text-align: left; border-left: 4px solid var(--azul-med); }
.info-box p { font-size: 13px; color: var(--azul); line-height: 1.7; margin: 0px; }
.bloco-card { background: var(--branco); border-radius: var(--raio); box-shadow: var(--sombra); overflow: hidden; margin-bottom: 16px; animation: 0.4s ease 0s 1 normal both running slideUp; }
@keyframes slideUp { 
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0px); }
}
.bloco-header { background: var(--azul); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
.bloco-letra { width: 32px; height: 32px; background: rgba(255, 255, 255, 0.18); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--fonte-h); font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
.bloco-titulo { font-family: var(--fonte-h); font-size: 14px; font-weight: 600; color: rgba(255, 255, 255, 0.95); }
.bloco-body { padding: 24px; }
.pq-wrap { margin-bottom: 28px; }
.pq-wrap:last-child { margin-bottom: 0px; }
.pq-num { font-family: var(--fonte-h); font-size: 10px; font-weight: 700; color: var(--azul-med); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.pq-txt { font-family: var(--fonte-h); font-size: 16px; font-weight: 600; color: var(--texto); line-height: 1.45; margin-bottom: 4px; }
.pq-dica { font-size: 13px; color: var(--cinza-t); margin-bottom: 14px; line-height: 1.5; }
.opcoes { display: flex; flex-direction: column; gap: 8px; }
.opcao { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border: 1.5px solid var(--cinza-b); border-radius: var(--raio-sm); cursor: pointer; transition: 0.18s; background: var(--cinza-f); user-select: none; }
.opcao:hover { border-color: var(--azul-med); background: var(--azul-light); }
.opcao.sel { border-color: var(--azul-med); background: var(--azul-light); box-shadow: rgba(27, 95, 168, 0.12) 0px 0px 0px 3px; }
.radio { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--cinza-b); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: 0.18s; }
.opcao.sel .radio { border-color: var(--azul-med); background: var(--azul-med); }
.opcao.sel .radio::after { content: ""; width: 8px; height: 8px; border-radius: 50%; background: white; }
.opcao-txt { font-size: 14px; color: var(--texto); line-height: 1.4; }
.opcao.sel .opcao-txt { color: var(--azul); font-weight: 500; }
.ac-wrap { position: relative; }
.campo { width: 100%; padding: 14px 16px; border: 1.5px solid var(--cinza-b); border-radius: var(--raio-sm); font-family: var(--fonte-b); font-size: 14px; color: var(--texto); background: var(--cinza-f); transition: border-color 0.18s; outline: none; }
.campo:focus { border-color: var(--azul-med); background: var(--branco); }
.campo::placeholder { color: rgb(176, 190, 197); }
.campo.ok { border-color: var(--verde); background: var(--verde-l); }
.campo.err { border-color: var(--vermelho); background: var(--vermelho-l); }
.ac-lista { position: absolute; top: calc(100% + 4px); left: 0px; right: 0px; background: var(--branco); border: 1.5px solid var(--azul-med); border-radius: var(--raio-sm); box-shadow: rgba(0, 0, 0, 0.12) 0px 8px 24px; z-index: 200; max-height: 220px; overflow-y: auto; display: none; }
.ac-lista.open { display: block; animation: 0.15s ease 0s 1 normal none running slideUp; }
.ac-item { padding: 12px 16px; cursor: pointer; font-size: 14px; color: var(--texto); border-bottom: 1px solid var(--cinza-f); transition: background 0.12s; display: flex; align-items: center; gap: 8px; }
.ac-item:last-child { border-bottom-width: medium; border-bottom-style: none; border-bottom-color: currentcolor; }
.ac-item:hover, .ac-item.ativo { background: var(--azul-light); color: var(--azul); }
.ac-item em { font-style: normal; font-weight: 700; color: var(--azul-med); }
.bairro-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--verde-l); border: 1px solid var(--verde); color: var(--verde); border-radius: 100px; padding: 5px 12px; font-size: 13px; font-weight: 500; margin-top: 8px; }
.bairro-badge button { background: none; border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; cursor: pointer; color: var(--verde); font-size: 18px; line-height: 1; padding: 0px 0px 0px 4px; }
.ac-hint { font-size: 12px; color: var(--cinza-t); margin-top: 6px; }
.geo-status { font-size: 12px; margin-top: 6px; display: flex; align-items: center; gap: 6px; }
.geo-spin { width: 12px; height: 12px; border-top-style: ; border-top-width: ; border-right-color: ; border-right-style: ; border-right-width: ; border-bottom-color: ; border-bottom-style: ; border-bottom-width: ; border-left-color: ; border-left-style: ; border-left-width: ; border-image-source: ; border-image-slice: ; border-image-width: ; border-image-outset: ; border-image-repeat: ; border-top-color: var(--azul-med); border-radius: 50%; animation: 0.7s linear 0s infinite normal none running spin360; }
@keyframes spin360 { 
  100% { transform: rotate(360deg); }
}
.geo-ok { color: var(--verde); font-weight: 500; }
.geo-err { color: var(--vermelho); }
.escala { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.en { flex: 1 1 0%; min-width: 36px; height: 48px; border: 1.5px solid var(--cinza-b); border-radius: 8px; background: var(--cinza-f); display: flex; align-items: center; justify-content: center; font-family: var(--fonte-h); font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.15s; color: var(--cinza-t); }
.en:hover { border-color: var(--azul-med); background: var(--azul-light); color: var(--azul); }
.en.sel { background: var(--azul-med); border-color: var(--azul-med); color: white; transform: scale(1.06); }
.en[data-v="0"] { color: var(--vermelho); }
.en[data-v="10"] { color: var(--verde); }
.en[data-v="0"].sel, .en[data-v="10"].sel { color: white; }
.escala-labs { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--cinza-t); }
.lk-wrap { overflow-x: auto; margin-top: 8px; }
.lk-table { width: 100%; border-collapse: collapse; min-width: 480px; }
.lk-table th { font-family: var(--fonte-h); font-size: 11px; font-weight: 600; color: var(--azul); text-align: center; padding: 8px 4px; border-bottom: 2px solid var(--cinza-b); }
.lk-table th:first-child { text-align: left; padding-left: 8px; }
.lk-table td { padding: 10px 4px; text-align: center; border-bottom: 1px solid var(--cinza-b); font-size: 13px; transition: background 0.15s; }
.lk-table td:first-child { text-align: left; padding-left: 8px; font-size: 13px; font-weight: 500; }
.lk-table tr:last-child td { border-bottom-width: medium; border-bottom-style: none; border-bottom-color: currentcolor; }
.lk-table tr:nth-child(2n) td { background: var(--cinza-f); }
.lk-table tr:hover td { background: var(--azul-light); }
.lk-r { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--cinza-b); margin: 0px auto; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; }
.lk-r:hover { border-color: var(--azul-med); }
.lk-r.on { border-color: var(--azul-med); background: var(--azul-med); }
.lk-r.on::after { content: ""; width: 9px; height: 9px; border-radius: 50%; background: white; }
.prio-lista { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.prio-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 1.5px solid var(--cinza-b); border-radius: var(--raio-sm); background: var(--cinza-f); cursor: grab; transition: 0.18s; user-select: none; }
.prio-item:hover { border-color: var(--azul-med); background: var(--azul-light); }
.prio-item.dragging { opacity: 0.5; cursor: grabbing; }
.prio-item.drag-over { border-color: var(--azul-med); background: var(--azul-light); transform: scale(1.01); }
.prio-rank { width: 26px; height: 26px; border-radius: 6px; background: var(--azul-med); color: white; font-family: var(--fonte-h); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.prio-nome { font-size: 14px; font-weight: 500; flex: 1 1 0%; }
.prio-drag { color: var(--cinza-b); font-size: 16px; }
.campo-area { width: 100%; padding: 14px 16px; border: 1.5px solid var(--cinza-b); border-radius: var(--raio-sm); font-family: var(--fonte-b); font-size: 14px; color: var(--texto); background: var(--cinza-f); resize: vertical; min-height: 100px; outline: none; transition: border-color 0.18s; }
.campo-area:focus { border-color: var(--azul-med); background: var(--branco); }
.cnt { font-size: 11px; color: var(--cinza-b); text-align: right; margin-top: 4px; }
.nota-rot { background: var(--laranja-l); border-left: 3px solid var(--laranja); border-radius: 0px 8px 8px 0px; padding: 10px 14px; margin-top: 10px; font-size: 12px; color: var(--laranja); font-weight: 500; }
.divider { height: 1px; background: var(--cinza-b); margin: 24px 0px; }
.af-badge { background: var(--cinza-f); border: 1px solid var(--cinza-b); border-radius: var(--raio-sm); padding: 10px 14px; margin-top: 16px; font-size: 12px; color: var(--cinza-t); line-height: 1.6; }
.af-badge strong { color: var(--texto); font-weight: 600; }
.nav-btns { display: flex; gap: 12px; margin-top: 24px; }
.btn-back { flex: 0 0 auto; padding: 14px 20px; border: 1.5px solid var(--cinza-b); border-radius: var(--raio-sm); background: none; cursor: pointer; font-family: var(--fonte-b); font-size: 14px; color: var(--cinza-t); transition: 0.18s; }
.btn-back:hover { border-color: var(--azul-med); color: var(--azul); }
.btn-next { flex: 1 1 0%; padding: 16px; border: none; border-radius: var(--raio-sm); background: var(--azul-med); color: white; font-family: var(--fonte-h); font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.18s; }
.btn-next:hover { background: var(--azul); transform: translateY(-1px); }
.btn-next:disabled { background: var(--cinza-b); cursor: default; transform: none; }
.btn-exp { display: block; width: 100%; padding: 16px; border: none; border-radius: var(--raio-sm); background: var(--azul-med); color: white; font-family: var(--fonte-h); font-size: 15px; font-weight: 600; cursor: pointer;transition: 0.18s; }
.btn-exp:hover { background: var(--azul); transform: translateY(-1px); }
.hidden { display: none !important; }
.tela { animation: 0.35s ease 0s 1 normal both running fadeIn; }
@keyframes fadeIn {
  0% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0px); }
}
.fim-card { background: var(--branco); border-radius: var(--raio); box-shadow: var(--sombra); padding: 40px 32px; text-align: center; }
.fim-icon { font-size: 56px; margin-bottom: 16px; }
.fim-card h2 { font-family: var(--fonte-h); font-size: 24px; font-weight: 700; color: var(--azul); margin-bottom: 8px; }
.fim-card p { font-size: 15px; color: var(--cinza-t); line-height: 1.7; margin-bottom: 20px; }
.modal-overlay { position: fixed; inset: 0px; background: rgba(10, 20, 40, 0.6); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; animation: 0.2s ease 0s 1 normal both running fadeIn; }
.modal-box { background: var(--branco); border-radius: var(--raio) var(--raio) 0px 0px; width: 100%; max-width: 480px; padding: 24px; max-height: 80vh; overflow-y: auto; }

.modal-busca { width: 100%; padding: 12px 14px; border: 1.5px solid rgb(226, 232, 240); border-radius: var(--raio-sm); font-size: 14px; outline: none; margin-bottom: 12px;px; }

.modal-bairro-item:last-child { border-bottom-width: medium; border-bottom-style: none; border-bottom-color: currentcolor; }

</style>
</head>

function normBusca(s){return(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();}
function levenshtein(a,b){if(a.length>25||b.length>25)return 99;const m=a.length,n=b.length;const dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}
function scoreEscola(query,e){const q=normBusca(query),n=normBusca(e.n),b=normBusca(e.b);if(n===q)return 0;if(n.includes(q))return 1;if(b.includes(q))return 2;const words=q.split(' ').filter(w=>w.length>2);const txt=n+' '+b;const hits=words.filter(w=>txt.includes(w));if(hits.length===words.length)return 3;if(hits.length>0)return 4+(words.length-hits.length);const nw=n.split(' ');const minL=Math.min(...words.map(w=>Math.min(...nw.map(nw2=>levenshtein(w,nw2)))));if(minL<=1)return 6;if(minL<=2)return 7;if(minL<=3)return 8;return 99;}
function buscarEscola(query,limite=8){if(!query||query.trim().length<2)return ESCOLAS_VOTACAO.slice(0,limite);const q=normBusca(query);const boost={};ALIASES.forEach(([t,i])=>{if(normBusca(t).includes(q)||q.includes(normBusca(t)))boost[i]=-5;});return ESCOLAS_VOTACAO.map(e=>({...e,_s:(boost[e.i]||0)+scoreEscola(query,e)})).filter(e=>e._s<90).sort((a,b)=>a._s-b._s).slice(0,limite);}

function renderEscolaResultados(query){
  const div=document.getElementById('escola-resultados-drop');
  if(!div)return;
  if(!query||query.length<2){div.style.display='none';return;}
  const res=buscarEscola(query,9);
  if(!res.length){div.innerHTML='<div class="esc-vazio">Nenhuma escola encontrada. Tente o bairro.</div>';div.style.display='block';return;}

}

function fingerprint() {
  const n = navigator, s = screen;
  const raw = [n.language,n.platform,n.hardwareConcurrency,n.maxTouchPoints,
    s.colorDepth,s.width+'x'+s.height,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    new Date().getTimezoneOffset(),
    n.userAgent.slice(0,80)].join('|');
  let h = 5381;
  for (let i=0;i<raw.length;i++){h=((h<<5)+h)+raw.charCodeAt(i);h=h&h;}
  return 'fp'+Math.abs(h).toString(36);
}
function idbOp(mode, key, val) {
  return new Promise(res => {
    try {
      const r = indexedDB.open('pqj_af',1);
      r.onupgradeneeded = e => e.target.result.createObjectStore('d');
      r.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction('d', mode);
        const st = tx.objectStore('d');
        const req = mode==='readwrite' ? st.put(val,key) : st.get(key);
        req.onsuccess = () => res(req.result||null);
        req.onerror = () => res(null);
      };
      r.onerror = () => res(null);
    } catch { res(null); }
  });
}
async function checkBloqueio() {
  const fp = fingerprint();
  const kls = VER+'_'+fp, kidb = VER+'_idb_'+fp;
  let rls=null, ridb=null;
  try { rls = JSON.parse(localStorage.getItem(kls)); } catch {}
  ridb = await idbOp('readonly', kidb);
  const lista = [rls,ridb].filter(Boolean);
  if (!lista.length) return {bloqueado:false, fp, kls, kidb};
  const rec = lista.reduce((a,b)=>a.ts>b.ts?a:b);
  const dias = (Date.now()-rec.ts)/(86400000);
  if (dias < DIAS) return {bloqueado:true, diasR: Math.ceil(DIAS-dias)};
  return {bloqueado:false, fp, kls, kidb};
}
async function registrar(fp, kls, kidb) {
  const d = {ts:Date.now(), fp, ver:'1.0'};
  try { localStorage.setItem(kls, JSON.stringify(d)); } catch {}
  await idbOp('readwrite', kidb, d);
}
async function enviarParaSheets(dados) {
  try {
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dados)
    });
    return true;
  } catch(err) {
    console.warn('Erro ao enviar:', err);
    return false;
  }
}
function exportar(){
  const d={meta:{versao:'1.0',municipio:'Jundiaí SP',base:'Censo IBGE 2022',ts:new Date().toISOString()},respostas:{...R}};

}
